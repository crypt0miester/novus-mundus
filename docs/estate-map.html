<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estate Layout Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #ccc; font-family: 'Segoe UI', system-ui, sans-serif; }

  .header {
    text-align: center; padding: 24px;
    background: linear-gradient(180deg, #111118 0%, #0a0a0f 100%);
    border-bottom: 1px solid #222;
  }
  .header h1 { color: #d4af37; font-size: 22px; letter-spacing: 2px; text-transform: uppercase; }
  .header p { color: #666; font-size: 12px; margin-top: 4px; }

  .controls {
    display: flex; justify-content: center; gap: 8px; padding: 16px;
    flex-wrap: wrap;
  }
  .era-btn {
    padding: 8px 16px; border: 1px solid #333; border-radius: 4px;
    background: #151520; color: #888; cursor: pointer; font-size: 12px;
    transition: all 0.3s;
  }
  .era-btn:hover { border-color: #555; color: #ccc; }
  .era-btn.active { border-color: #d4af37; color: #d4af37; background: #1a1a28; }

  .layout { display: flex; justify-content: center; padding: 20px; gap: 40px; flex-wrap: wrap; }

  /* ---- Top-down map ---- */
  .map-container {
    position: relative; width: 600px; height: 600px;
  }
  .map-svg { width: 100%; height: 100%; }

  /* ---- Legend ---- */
  .legend {
    width: 260px; padding: 16px;
    background: #111118; border: 1px solid #222; border-radius: 8px;
    align-self: flex-start;
  }
  .legend h3 { color: #d4af37; font-size: 14px; margin-bottom: 12px; letter-spacing: 1px; }
  .legend-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid #1a1a24;
  }
  .legend-item:last-child { border-bottom: none; }
  .legend-swatch {
    width: 20px; height: 20px; border-radius: 3px; flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .legend-label { font-size: 12px; }
  .legend-label span { display: block; color: #555; font-size: 10px; margin-top: 2px; }

  .level-display {
    text-align: center; padding: 8px;
    color: #d4af37; font-size: 14px; letter-spacing: 1px;
  }

  /* ---- Side view ---- */
  .side-view {
    width: 100%; max-width: 900px; margin: 0 auto; padding: 0 20px 40px;
  }
  .side-view h3 {
    color: #d4af37; font-size: 14px; text-align: center;
    margin-bottom: 16px; letter-spacing: 1px;
  }
  .side-svg { width: 100%; height: 280px; }

  /* Color palette */
  .palette {
    display: flex; justify-content: center; gap: 16px; padding: 16px;
    flex-wrap: wrap;
  }
  .palette-card {
    width: 120px; text-align: center; padding: 8px;
    border: 1px solid #222; border-radius: 6px; background: #111118;
  }
  .palette-color {
    width: 100%; height: 40px; border-radius: 4px; margin-bottom: 6px;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .palette-card span { font-size: 10px; color: #666; }
  .palette-card strong { display: block; font-size: 11px; color: #aaa; margin-bottom: 2px; }
</style>
</head>
<body>

<div class="header">
  <h1>Estate Component Map</h1>
  <p>8 layers composited at runtime — top-down and side views</p>
</div>

<div class="controls" id="era-controls"></div>
<div class="level-display" id="level-display"></div>

<div class="layout">
  <div class="map-container">
    <svg class="map-svg" id="map-svg" viewBox="0 0 600 600"></svg>
  </div>
  <div class="legend" id="legend"></div>
</div>

<div class="side-view">
  <h3>SIDE ELEVATION</h3>
  <svg class="side-svg" id="side-svg" viewBox="0 0 900 280"></svg>
</div>

<div id="palette-section"></div>

<script>
// ──────────────────────────────────────────────
// Era definitions with color palettes
// ──────────────────────────────────────────────
const ERAS = [
  {
    name: 'Frontier', levels: '1–10', level: 5,
    colors: {
      terrain:   '#4a6741', // earthy green
      perimeter: '#8B7355', // wood brown
      courtyard: '#7a6b5a', // packed dirt
      keep:      '#9B8B75', // wood/thatch
      monument:  '#B8860B', // campfire orange
      wings:     '#7a6b5a', // matches courtyard (empty early)
      gardens:   '#5a7a4a', // wild green
      crown:     '#7a6b5a', // nothing yet
    }
  },
  {
    name: 'Established', levels: '11–20', level: 15,
    colors: {
      terrain:   '#5a7a50',
      perimeter: '#808080', // stone gray
      courtyard: '#8a8a80', // cobblestone
      keep:      '#A0937D', // stone + timber
      monument:  '#A0A0A0', // carved stone
      wings:     '#8B7355', // wood outbuildings
      gardens:   '#6a9a5a', // planted
      crown:     '#B8860B', // flag colors
    }
  },
  {
    name: 'Prosperous', levels: '21–30', level: 25,
    colors: {
      terrain:   '#6a9a58',
      perimeter: '#A0A0A0', // masonry
      courtyard: '#B0A898', // cut stone
      keep:      '#C0B8A8', // full stone castle
      monument:  '#2a2a2a', // dark obelisk
      wings:     '#A0937D', // stone buildings
      gardens:   '#7ab868', // formal gardens
      crown:     '#C0B8A8', // stone crest
    }
  },
  {
    name: 'Imperial', levels: '31–40', level: 35,
    colors: {
      terrain:   '#7ab868',
      perimeter: '#E8E0D0', // white marble
      courtyard: '#E0D8C8', // marble floor
      keep:      '#F0E8D8', // white palace
      monument:  '#d4af37', // golden orrery
      wings:     '#E0D8C8', // grand halls
      gardens:   '#F0C0D0', // cherry blossoms
      crown:     '#d4af37', // illuminated gold
    }
  },
  {
    name: 'Arcane', levels: '41–50', level: 45,
    colors: {
      terrain:   '#4a7a8a', // crystal teal
      perimeter: '#6a5aaa', // runed purple
      courtyard: '#8080c0', // crystalline
      keep:      '#9a8ad0', // crystal palace
      monument:  '#4040a0', // rift blue
      wings:     '#8a7ac0', // arcane wings
      gardens:   '#50c8a0', // magical flora
      crown:     '#b090e0', // floating sigil
    }
  },
  {
    name: 'Mythic', levels: '51–60', level: 55,
    colors: {
      terrain:   '#0d1b2a', // deep blue-black
      perimeter: '#0a0a12', // pure black walls
      courtyard: '#1a2744', // dark blue stone
      keep:      '#d4af37', // gold citadel
      monument:  '#4a90d4', // luminous blue tree
      wings:     '#c4a030', // gold wings
      gardens:   '#2060c0', // blue bioluminescence
      crown:     '#4a90d4', // blue beacon
    }
  },
];

// ──────────────────────────────────────────────
// Layer definitions (radii for top-down, heights for side)
// ──────────────────────────────────────────────
const LAYERS = [
  { id: 'terrain',   label: 'Terrain Disc',   desc: 'Ground foundation', radius: 270, sideH: 20,  sideY: 240, sideW: 860 },
  { id: 'perimeter', label: 'Perimeter',       desc: 'Walls, gate, moat', radius: 220, sideH: 80,  sideY: 160, sideW: 700 },
  { id: 'courtyard', label: 'Courtyard',       desc: 'Paved floor',       radius: 195, sideH: 10,  sideY: 235, sideW: 620 },
  { id: 'gardens',   label: 'Gardens',         desc: 'Organic elements',  radius: 195, sideH: 50,  sideY: 190, sideW: 600 },
  { id: 'wings',     label: 'Wings',           desc: 'Flanking buildings', radius: 0,   sideH: 70,  sideY: 170, sideW: 300 },
  { id: 'keep',      label: 'Keep',            desc: 'Main building',     radius: 70,  sideH: 130, sideY: 110, sideW: 160 },
  { id: 'monument',  label: 'Monument',        desc: 'Courtyard center',  radius: 30,  sideH: 60,  sideY: 180, sideW: 60  },
  { id: 'crown',     label: 'Crown',           desc: 'Sky element',       radius: 25,  sideH: 40,  sideY: 60,  sideW: 80  },
];

const CX = 300, CY = 300;
let currentEra = 5; // start at Mythic

// ──────────────────────────────────────────────
// Render controls
// ──────────────────────────────────────────────
function renderControls() {
  const el = document.getElementById('era-controls');
  el.innerHTML = ERAS.map((era, i) =>
    `<button class="era-btn ${i === currentEra ? 'active' : ''}" onclick="setEra(${i})">${era.name}<br><span style="font-size:10px;color:#555">Lv ${era.levels}</span></button>`
  ).join('');
}

function setEra(i) {
  currentEra = i;
  renderControls();
  renderMap();
  renderSideView();
  renderLegend();
  renderPalette();
  document.getElementById('level-display').textContent = `Level ${ERAS[i].level} — ${ERAS[i].name} Era`;
}

// ──────────────────────────────────────────────
// Render top-down map
// ──────────────────────────────────────────────
function renderMap() {
  const svg = document.getElementById('map-svg');
  const era = ERAS[currentEra];
  const c = era.colors;
  const isMythic = currentEra === 5;

  let html = '';

  // Background
  html += `<rect width="600" height="600" fill="#0a0a0f"/>`;

  // Layer 0: Terrain disc
  if (isMythic) {
    // Floating fragments
    html += `<circle cx="${CX-200}" cy="${CY-180}" r="25" fill="${c.terrain}" opacity="0.4"/>`;
    html += `<circle cx="${CX+210}" cy="${CY+160}" r="20" fill="${c.terrain}" opacity="0.3"/>`;
    html += `<circle cx="${CX-180}" cy="${CY+200}" r="15" fill="${c.terrain}" opacity="0.35"/>`;
    html += `<circle cx="${CX+190}" cy="${CY-190}" r="18" fill="${c.terrain}" opacity="0.3"/>`;
  }
  html += `<circle cx="${CX}" cy="${CY}" r="270" fill="${c.terrain}" opacity="0.9"/>`;
  if (isMythic) {
    html += `<circle cx="${CX}" cy="${CY}" r="270" fill="none" stroke="#4a90d4" stroke-width="1" opacity="0.3"/>`;
    html += `<circle cx="${CX}" cy="${CY}" r="265" fill="none" stroke="#4a90d4" stroke-width="0.5" opacity="0.2"/>`;
  }

  // Layer 1: Perimeter
  const wallThickness = currentEra < 2 ? 3 : currentEra < 4 ? 8 : 12;
  if (isMythic) {
    // Energy barrier
    html += `<circle cx="${CX}" cy="${CY}" r="220" fill="none" stroke="${c.perimeter}" stroke-width="2"/>`;
    html += `<circle cx="${CX}" cy="${CY}" r="222" fill="none" stroke="#4a90d4" stroke-width="1" opacity="0.5" stroke-dasharray="8 4"/>`;
    html += `<circle cx="${CX}" cy="${CY}" r="218" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.3" stroke-dasharray="4 8"/>`;
    // Crystal anchors
    for (let a = 0; a < 360; a += 90) {
      const rad = a * Math.PI / 180;
      const x = CX + Math.cos(rad) * 220;
      const y = CY + Math.sin(rad) * 220;
      html += `<polygon points="${x},${y-10} ${x+7},${y+5} ${x-7},${y+5}" fill="#4a90d4" opacity="0.8"/>`;
    }
  } else {
    html += `<circle cx="${CX}" cy="${CY}" r="220" fill="none" stroke="${c.perimeter}" stroke-width="${wallThickness}"/>`;
    // Corner towers (from era 2+)
    if (currentEra >= 2) {
      for (let a = 45; a < 360; a += 90) {
        const rad = a * Math.PI / 180;
        const x = CX + Math.cos(rad) * 220;
        const y = CY + Math.sin(rad) * 220;
        const towerR = currentEra >= 4 ? 16 : 10;
        html += `<circle cx="${x}" cy="${y}" r="${towerR}" fill="${c.perimeter}" stroke="#0a0a0f" stroke-width="1"/>`;
      }
    }
  }

  // Gate (always at bottom/south)
  const gateY = CY + 220;
  const gateW = currentEra < 2 ? 16 : currentEra < 4 ? 24 : 32;
  if (isMythic) {
    html += `<rect x="${CX - gateW/2}" y="${gateY - 8}" width="${gateW}" height="16" rx="4" fill="#4a90d4" opacity="0.6"/>`;
    html += `<rect x="${CX - gateW/2 + 2}" y="${gateY - 6}" width="${gateW - 4}" height="12" rx="3" fill="#0d1b2a"/>`;
  } else {
    html += `<rect x="${CX - gateW/2}" y="${gateY - 6}" width="${gateW}" height="12" rx="2" fill="${c.perimeter}"/>`;
  }
  // Gate label
  html += `<text x="${CX}" y="${gateY + 26}" text-anchor="middle" fill="#555" font-size="9">GATE</text>`;

  // Moat (era 3+)
  if (currentEra >= 3 && !isMythic) {
    const moatColor = currentEra >= 4 ? '#4a6a9a' : '#3a5a4a';
    html += `<circle cx="${CX}" cy="${CY}" r="${220 + wallThickness/2 + 8}" fill="none" stroke="${moatColor}" stroke-width="5" opacity="0.4"/>`;
  }

  // Layer 2: Courtyard
  html += `<circle cx="${CX}" cy="${CY}" r="195" fill="${c.courtyard}" opacity="0.7"/>`;
  if (isMythic) {
    // Rune circles
    html += `<circle cx="${CX}" cy="${CY}" r="190" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.3" stroke-dasharray="2 6"/>`;
    html += `<circle cx="${CX}" cy="${CY}" r="150" fill="none" stroke="#4a90d4" stroke-width="0.5" opacity="0.2" stroke-dasharray="3 9"/>`;
    html += `<circle cx="${CX}" cy="${CY}" r="100" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.2"/>`;
  }
  // Radial paths
  if (currentEra >= 1) {
    const pathColor = isMythic ? '#d4af3730' : (currentEra >= 3 ? '#00000020' : '#00000015');
    for (let a = 0; a < 360; a += 90) {
      const rad = a * Math.PI / 180;
      const x2 = CX + Math.cos(rad) * 195;
      const y2 = CY + Math.sin(rad) * 195;
      html += `<line x1="${CX}" y1="${CY}" x2="${x2}" y2="${y2}" stroke="${pathColor}" stroke-width="4"/>`;
    }
  }

  // Layer 6: Gardens (organic patches between structures)
  if (currentEra >= 1) {
    const gardenPositions = [
      { x: CX - 130, y: CY - 130, r: 35 },
      { x: CX + 130, y: CY - 130, r: 30 },
      { x: CX - 140, y: CY + 100, r: 28 },
      { x: CX + 140, y: CY + 100, r: 32 },
      { x: CX - 60,  y: CY - 160, r: 22 },
      { x: CX + 60,  y: CY - 160, r: 22 },
    ];
    for (const g of gardenPositions) {
      const r = g.r * (0.6 + currentEra * 0.08);
      html += `<ellipse cx="${g.x}" cy="${g.y}" rx="${r}" ry="${r * 0.8}" fill="${c.gardens}" opacity="0.5"/>`;
      if (isMythic) {
        html += `<ellipse cx="${g.x}" cy="${g.y}" rx="${r * 0.6}" ry="${r * 0.5}" fill="#4a90d4" opacity="0.15"/>`;
      }
    }
  }

  // Layer 5: Wings (left = military, right = economic)
  if (currentEra >= 1) {
    const wingW = 40 + currentEra * 12;
    const wingH = 30 + currentEra * 8;
    // Left wing (military)
    html += `<rect x="${CX - 120 - wingW/2}" y="${CY - wingH/2}" width="${wingW}" height="${wingH}" rx="4" fill="${c.wings}" opacity="0.85"/>`;
    if (isMythic) {
      html += `<rect x="${CX - 120 - wingW/2 + 2}" y="${CY - wingH/2 + 2}" width="${wingW - 4}" height="${wingH - 4}" rx="3" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.5"/>`;
    }
    html += `<text x="${CX - 120}" y="${CY + wingH/2 + 12}" text-anchor="middle" fill="#444" font-size="8">MILITARY</text>`;
    // Right wing (economic)
    html += `<rect x="${CX + 120 - wingW/2}" y="${CY - wingH/2}" width="${wingW}" height="${wingH}" rx="4" fill="${c.wings}" opacity="0.85"/>`;
    if (isMythic) {
      html += `<rect x="${CX + 120 - wingW/2 + 2}" y="${CY - wingH/2 + 2}" width="${wingW - 4}" height="${wingH - 4}" rx="3" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.5"/>`;
    }
    html += `<text x="${CX + 120}" y="${CY + wingH/2 + 12}" text-anchor="middle" fill="#444" font-size="8">TREASURY</text>`;

    // Walkways connecting wings to keep
    if (currentEra >= 3) {
      const walkColor = isMythic ? '#d4af3740' : c.wings + '80';
      html += `<rect x="${CX - 120 + wingW/2}" y="${CY - 4}" width="${120 - wingW/2 - 35}" height="8" fill="${walkColor}"/>`;
      html += `<rect x="${CX + 35}" y="${CY - 4}" width="${120 - wingW/2 - 35}" height="8" fill="${walkColor}"/>`;
    }
  }

  // Layer 3: Keep
  const keepSize = 50 + currentEra * 10;
  if (isMythic) {
    // Mythic keep — octagonal with glow
    const points = [];
    for (let i = 0; i < 8; i++) {
      const a = (i * 45 - 22.5) * Math.PI / 180;
      points.push(`${CX + Math.cos(a) * keepSize * 0.75},${CY + Math.sin(a) * keepSize * 0.75}`);
    }
    html += `<polygon points="${points.join(' ')}" fill="${c.keep}" opacity="0.9"/>`;
    html += `<polygon points="${points.join(' ')}" fill="none" stroke="#0a0a12" stroke-width="2"/>`;
    // Inner glow
    const innerPts = [];
    for (let i = 0; i < 8; i++) {
      const a = (i * 45 - 22.5) * Math.PI / 180;
      innerPts.push(`${CX + Math.cos(a) * keepSize * 0.5},${CY + Math.sin(a) * keepSize * 0.5}`);
    }
    html += `<polygon points="${innerPts.join(' ')}" fill="#4a90d4" opacity="0.15"/>`;
    html += `<circle cx="${CX}" cy="${CY}" r="${keepSize * 0.2}" fill="#4a90d4" opacity="0.3"/>`;
  } else {
    html += `<rect x="${CX - keepSize/2}" y="${CY - keepSize/2}" width="${keepSize}" height="${keepSize}" rx="4" fill="${c.keep}" opacity="0.9"/>`;
    // Inner rooms visible at higher eras
    if (currentEra >= 2) {
      html += `<rect x="${CX - keepSize/2 + 4}" y="${CY - keepSize/2 + 4}" width="${keepSize - 8}" height="${keepSize - 8}" rx="2" fill="none" stroke="#0a0a0f" stroke-width="1" opacity="0.3"/>`;
    }
    // Central tower at era 3+
    if (currentEra >= 3) {
      html += `<circle cx="${CX}" cy="${CY}" r="${keepSize * 0.2}" fill="${c.keep}" stroke="#0a0a0f" stroke-width="1"/>`;
    }
  }
  html += `<text x="${CX}" y="${CY - keepSize/2 - 8}" text-anchor="middle" fill="#888" font-size="10" font-weight="bold">KEEP</text>`;

  // Layer 4: Monument (south of keep, between keep and gate)
  const monX = CX;
  const monY = CY + 100;
  const monR = 15 + currentEra * 3;
  if (isMythic) {
    // World tree — organic circle with glow
    html += `<circle cx="${monX}" cy="${monY}" r="${monR}" fill="${c.monument}" opacity="0.6"/>`;
    html += `<circle cx="${monX}" cy="${monY}" r="${monR + 8}" fill="none" stroke="#4a90d4" stroke-width="0.5" opacity="0.3"/>`;
    html += `<circle cx="${monX}" cy="${monY}" r="${monR + 15}" fill="none" stroke="#4a90d4" stroke-width="0.5" opacity="0.15"/>`;
    // Root lines
    for (let a = 0; a < 360; a += 45) {
      const rad = a * Math.PI / 180;
      const x2 = monX + Math.cos(rad) * (monR + 30);
      const y2 = monY + Math.sin(rad) * (monR + 30);
      html += `<line x1="${monX}" y1="${monY}" x2="${x2}" y2="${y2}" stroke="#4a90d4" stroke-width="0.5" opacity="0.2"/>`;
    }
  } else {
    html += `<circle cx="${monX}" cy="${monY}" r="${monR}" fill="${c.monument}" opacity="0.7"/>`;
  }
  html += `<text x="${monX}" y="${monY + monR + 14}" text-anchor="middle" fill="#444" font-size="8">MONUMENT</text>`;

  // Layer 7: Crown (center, above keep — shown as concentric glow)
  if (currentEra >= 1) {
    if (isMythic) {
      // Beacon column
      html += `<circle cx="${CX}" cy="${CY}" r="12" fill="#4a90d4" opacity="0.6"/>`;
      html += `<circle cx="${CX}" cy="${CY}" r="20" fill="none" stroke="#4a90d4" stroke-width="1" opacity="0.3"/>`;
      html += `<circle cx="${CX}" cy="${CY}" r="28" fill="none" stroke="#4a90d4" stroke-width="0.5" opacity="0.15"/>`;
    } else if (currentEra >= 3) {
      html += `<circle cx="${CX}" cy="${CY}" r="8" fill="${c.crown}" opacity="0.6"/>`;
    }
  }

  // Compass labels
  html += `<text x="${CX}" y="22" text-anchor="middle" fill="#333" font-size="10">N</text>`;
  html += `<text x="${CX}" y="592" text-anchor="middle" fill="#333" font-size="10">S</text>`;
  html += `<text x="12" y="${CY + 4}" text-anchor="start" fill="#333" font-size="10">W</text>`;
  html += `<text x="588" y="${CY + 4}" text-anchor="end" fill="#333" font-size="10">E</text>`;

  svg.innerHTML = html;
}

// ──────────────────────────────────────────────
// Render side elevation view
// ──────────────────────────────────────────────
function renderSideView() {
  const svg = document.getElementById('side-svg');
  const era = ERAS[currentEra];
  const c = era.colors;
  const isMythic = currentEra === 5;
  const baseY = 260;

  let html = `<rect width="900" height="280" fill="#0a0a0f"/>`;

  // Ground line
  html += `<line x1="20" y1="${baseY}" x2="880" y2="${baseY}" stroke="#222" stroke-width="1"/>`;

  const cx = 450;

  // Terrain disc
  html += `<rect x="${cx - 430}" y="${baseY - 8}" width="860" height="16" rx="4" fill="${c.terrain}" opacity="0.7"/>`;
  if (isMythic) {
    // Floating fragments
    html += `<rect x="${cx - 420}" y="${baseY - 20}" width="30" height="10" rx="3" fill="${c.terrain}" opacity="0.3" transform="rotate(-5 ${cx-405} ${baseY-15})"/>`;
    html += `<rect x="${cx + 390}" y="${baseY - 18}" width="25" height="8" rx="3" fill="${c.terrain}" opacity="0.3" transform="rotate(8 ${cx+402} ${baseY-14})"/>`;
  }

  // Courtyard
  html += `<rect x="${cx - 310}" y="${baseY - 4}" width="620" height="8" rx="2" fill="${c.courtyard}" opacity="0.6"/>`;

  // Perimeter walls (left + right)
  const wallH = 30 + currentEra * 15;
  if (isMythic) {
    // Energy barriers
    html += `<line x1="${cx - 330}" y1="${baseY}" x2="${cx - 330}" y2="${baseY - wallH}" stroke="#4a90d4" stroke-width="2" opacity="0.6" stroke-dasharray="4 3"/>`;
    html += `<line x1="${cx + 330}" y1="${baseY}" x2="${cx + 330}" y2="${baseY - wallH}" stroke="#4a90d4" stroke-width="2" opacity="0.6" stroke-dasharray="4 3"/>`;
    // Crystal anchors
    html += `<polygon points="${cx-330},${baseY - wallH - 8} ${cx-325},${baseY - wallH + 2} ${cx-335},${baseY - wallH + 2}" fill="#4a90d4"/>`;
    html += `<polygon points="${cx+330},${baseY - wallH - 8} ${cx+335},${baseY - wallH + 2} ${cx+325},${baseY - wallH + 2}" fill="#4a90d4"/>`;
  } else {
    const ww = currentEra < 2 ? 4 : 10;
    html += `<rect x="${cx - 340}" y="${baseY - wallH}" width="${ww}" height="${wallH}" fill="${c.perimeter}"/>`;
    html += `<rect x="${cx + 340 - ww}" y="${baseY - wallH}" width="${ww}" height="${wallH}" fill="${c.perimeter}"/>`;
    // Towers
    if (currentEra >= 2) {
      const tw = ww + 6;
      const th = wallH + 15;
      html += `<rect x="${cx - 340 - 3}" y="${baseY - th}" width="${tw}" height="${th}" rx="2" fill="${c.perimeter}"/>`;
      html += `<rect x="${cx + 340 - ww - 3}" y="${baseY - th}" width="${tw}" height="${th}" rx="2" fill="${c.perimeter}"/>`;
      // Tower roofs
      if (currentEra >= 3) {
        html += `<polygon points="${cx-340-3},${baseY-th} ${cx-340+tw/2-3},${baseY-th-12} ${cx-340+tw-3},${baseY-th}" fill="${c.perimeter}"/>`;
        html += `<polygon points="${cx+340-ww-3},${baseY-th} ${cx+340-ww+tw/2-3},${baseY-th-12} ${cx+340-ww+tw-3},${baseY-th}" fill="${c.perimeter}"/>`;
      }
    }
  }

  // Wings
  if (currentEra >= 1) {
    const wingW = 60 + currentEra * 15;
    const wingH = 40 + currentEra * 12;
    // Left wing
    html += `<rect x="${cx - 200 - wingW/2}" y="${baseY - wingH}" width="${wingW}" height="${wingH}" rx="3" fill="${c.wings}"/>`;
    if (isMythic) {
      html += `<rect x="${cx - 200 - wingW/2 + 2}" y="${baseY - wingH + 2}" width="${wingW - 4}" height="${wingH - 4}" rx="2" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.4"/>`;
      // Dome
      html += `<ellipse cx="${cx - 200}" cy="${baseY - wingH}" rx="${wingW * 0.35}" ry="15" fill="${c.wings}" opacity="0.8"/>`;
    } else if (currentEra >= 3) {
      // Roof
      html += `<polygon points="${cx-200-wingW/2},${baseY-wingH} ${cx-200},${baseY-wingH-15} ${cx-200+wingW/2},${baseY-wingH}" fill="${c.wings}"/>`;
    }
    // Right wing
    html += `<rect x="${cx + 200 - wingW/2}" y="${baseY - wingH}" width="${wingW}" height="${wingH}" rx="3" fill="${c.wings}"/>`;
    if (isMythic) {
      html += `<rect x="${cx + 200 - wingW/2 + 2}" y="${baseY - wingH + 2}" width="${wingW - 4}" height="${wingH - 4}" rx="2" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.4"/>`;
      html += `<ellipse cx="${cx + 200}" cy="${baseY - wingH}" rx="${wingW * 0.35}" ry="15" fill="${c.wings}" opacity="0.8"/>`;
    } else if (currentEra >= 3) {
      html += `<polygon points="${cx+200-wingW/2},${baseY-wingH} ${cx+200},${baseY-wingH-15} ${cx+200+wingW/2},${baseY-wingH}" fill="${c.wings}"/>`;
    }
  }

  // Gardens (small organic shapes between wings and walls)
  if (currentEra >= 1) {
    const gPositions = [cx - 280, cx - 100, cx + 100, cx + 280];
    for (const gx of gPositions) {
      const gh = 15 + currentEra * 5;
      html += `<ellipse cx="${gx}" cy="${baseY - gh/2}" rx="20" ry="${gh/2}" fill="${c.gardens}" opacity="0.5"/>`;
      if (currentEra >= 3) {
        // Tree trunk + canopy
        html += `<rect x="${gx - 2}" y="${baseY - gh - 10}" width="4" height="15" fill="#5a4a3a"/>`;
        html += `<ellipse cx="${gx}" cy="${baseY - gh - 15}" rx="14" ry="10" fill="${c.gardens}" opacity="0.6"/>`;
      }
    }
  }

  // Keep (center)
  const keepW = 80 + currentEra * 20;
  const keepH = 60 + currentEra * 25;
  html += `<rect x="${cx - keepW/2}" y="${baseY - keepH}" width="${keepW}" height="${keepH}" rx="3" fill="${c.keep}"/>`;

  if (isMythic) {
    // Gold trim
    html += `<rect x="${cx - keepW/2}" y="${baseY - keepH}" width="${keepW}" height="${keepH}" rx="3" fill="none" stroke="#0a0a12" stroke-width="2"/>`;
    html += `<rect x="${cx - keepW/2 + 3}" y="${baseY - keepH + 3}" width="${keepW - 6}" height="${keepH - 6}" rx="2" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.4"/>`;
    // Spire
    html += `<polygon points="${cx},${baseY - keepH - 60} ${cx - 12},${baseY - keepH} ${cx + 12},${baseY - keepH}" fill="${c.keep}"/>`;
    html += `<polygon points="${cx},${baseY - keepH - 60} ${cx - 12},${baseY - keepH} ${cx + 12},${baseY - keepH}" fill="none" stroke="#0a0a12" stroke-width="1"/>`;
    // Windows (blue glow)
    for (let row = 0; row < 3; row++) {
      for (let col = -1; col <= 1; col++) {
        const wx = cx + col * (keepW * 0.25);
        const wy = baseY - keepH * 0.3 - row * (keepH * 0.22);
        html += `<rect x="${wx - 4}" y="${wy - 6}" width="8" height="12" rx="4" fill="#4a90d4" opacity="0.5"/>`;
      }
    }
  } else {
    // Roof
    if (currentEra >= 2) {
      html += `<polygon points="${cx - keepW/2 - 5},${baseY - keepH} ${cx},${baseY - keepH - 20 - currentEra * 5} ${cx + keepW/2 + 5},${baseY - keepH}" fill="${c.keep}"/>`;
    }
    // Tower
    if (currentEra >= 3) {
      const towerW = 24;
      const towerH = keepH + 30;
      html += `<rect x="${cx - towerW/2}" y="${baseY - towerH}" width="${towerW}" height="${towerH}" fill="${c.keep}" stroke="#0a0a0f" stroke-width="0.5"/>`;
      html += `<polygon points="${cx - towerW/2 - 2},${baseY - towerH} ${cx},${baseY - towerH - 15} ${cx + towerW/2 + 2},${baseY - towerH}" fill="${c.keep}"/>`;
    }
  }

  // Monument (in front of keep, slightly to the side for visibility)
  const monSideX = cx + keepW/2 + 40;
  if (isMythic) {
    // World tree
    html += `<rect x="${monSideX - 3}" y="${baseY - 70}" width="6" height="70" fill="#4a90d4" opacity="0.6"/>`;
    html += `<ellipse cx="${monSideX}" cy="${baseY - 75}" rx="25" ry="18" fill="#4a90d4" opacity="0.3"/>`;
    html += `<ellipse cx="${monSideX}" cy="${baseY - 85}" rx="18" ry="12" fill="#4a90d4" opacity="0.2"/>`;
  } else {
    const mh = 20 + currentEra * 8;
    html += `<rect x="${monSideX - 6}" y="${baseY - mh}" width="12" height="${mh}" rx="2" fill="${c.monument}"/>`;
  }

  // Crown / Beacon
  if (isMythic) {
    // Blue beam shooting up
    html += `<rect x="${cx - 3}" y="10" width="6" height="${baseY - keepH - 70}" fill="#4a90d4" opacity="0.3"/>`;
    html += `<rect x="${cx - 1}" y="10" width="2" height="${baseY - keepH - 70}" fill="#4a90d4" opacity="0.6"/>`;
    // Glow at top
    html += `<circle cx="${cx}" cy="20" r="12" fill="#4a90d4" opacity="0.15"/>`;
  } else if (currentEra >= 2) {
    // Flag/banner
    const flagY = currentEra >= 3 ? baseY - keepH - 50 : baseY - keepH - 15;
    html += `<line x1="${cx}" y1="${flagY}" x2="${cx}" y2="${flagY - 15}" stroke="${c.crown}" stroke-width="1.5"/>`;
    html += `<polygon points="${cx},${flagY - 15} ${cx + 12},${flagY - 10} ${cx},${flagY - 5}" fill="${c.crown}" opacity="0.7"/>`;
  }

  // Labels
  html += `<line x1="20" y1="${baseY + 6}" x2="880" y2="${baseY + 6}" stroke="#1a1a24" stroke-width="0.5"/>`;

  svg.innerHTML = html;
}

// ──────────────────────────────────────────────
// Legend
// ──────────────────────────────────────────────
function renderLegend() {
  const era = ERAS[currentEra];
  const el = document.getElementById('legend');

  const stageMap = {
    terrain: 8, perimeter: 10, courtyard: 8, keep: 15,
    monument: 8, wings: 10, gardens: 8, crown: 6
  };

  el.innerHTML = `<h3>LAYERS — ${era.name.toUpperCase()}</h3>` +
    LAYERS.map(l => `
      <div class="legend-item">
        <div class="legend-swatch" style="background:${era.colors[l.id]}"></div>
        <div class="legend-label">
          <strong style="color:#ccc">${l.label}</strong>
          <span>${l.desc} — ${stageMap[l.id]} stages</span>
        </div>
      </div>
    `).join('');
}

// Mythic color palette
// ──────────────────────────────────────────────

  const section = document.getElementById('palette-section');
  if (currentEra !== 5) { section.innerHTML = ''; return; }

  section.innerHTML = `
    <div style="text-align:center;padding:24px 0 8px">
      <h3 style="color:#d4af37;font-size:14px;letter-spacing:1px">MYTHIC PALETTE</h3>
      <p style="color:#555;font-size:11px;margin-top:4px">Blue, Gold, Black — the colors of transcendence</p>
    </div>
    <div class="palette">
      <div class="palette-card">
        <div class="palette-color" style="background:#0a0a12"></div>
        <strong>Void Black</strong>
        <span>#0A0A12 — Walls, borders, frames</span>
      </div>
      <div class="palette-card">
        <div class="palette-color" style="background:#0d1b2a"></div>
        <strong>Deep Navy</strong>
        <span>#0D1B2A — Terrain, shadows</span>
      </div>
      <div class="palette-card">
        <div class="palette-color" style="background:#1a2744"></div>
        <strong>Midnight Blue</strong>
        <span>#1A2744 — Courtyard, floors</span>
      </div>
      <div class="palette-card">
        <div class="palette-color" style="background:#4a90d4"></div>
        <strong>Arcane Blue</strong>
        <span>#4A90D4 — Energy, glow, beacon</span>
      </div>
      <div class="palette-card">
        <div class="palette-color" style="background:#d4af37"></div>
        <strong>Royal Gold</strong>
        <span>#D4AF37 — Keep, trim, accents</span>
      </div>
      <div class="palette-card">
        <div class="palette-color" style="background:#c4a030"></div>
        <strong>Antique Gold</strong>
        <span>#C4A030 — Wings, secondary</span>
      </div>
      <div class="palette-card">
        <div class="palette-color" style="background:#2060c0"></div>
        <strong>Mystic Blue</strong>
        <span>#2060C0 — Gardens, flora</span>
      </div>
    </div>
  `;
}

setEra(5); // Start on Mythic
